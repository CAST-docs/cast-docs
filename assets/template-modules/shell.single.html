<!doctype html>
<html lang="{{ LANG }}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="{{ DESCRIPTION }}">
<title>{{ TITLE }}</title>
<style>{{ STYLE }}</style>
</head>
<body>
<aside class="sidebar">{{ SIDEBAR }}</aside>
<header class="topbar"><span class="topbar-title">{{ TITLE }}</span>{{ TOPBAR_LINKS }}<span class="topbar-spacer"></span></header>
<article class="doc">
<header class="doc-header"><h1>{{ TITLE }}</h1>{{ DOC_META }}</header>
<main>{{ SECTIONS }}</main>
<footer class="doc-footer">{{ FOOTER }}</footer>
</article>
{{ INTERACTION_HOOKS }}
{{ INTERACTION_SCRIPTS }}
</body>
</html>
