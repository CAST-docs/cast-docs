<!doctype html>
<html lang="{{ LANG }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ DESCRIPTION }}">
  <title>{{ TITLE }}</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f8fa;
      --surface: #ffffff;
      --surface-soft: #f1f5f9;
      --text: #1f2937;
      --muted: #64748b;
      --border: #d9e0e8;
      --primary: #2563eb;
      --primary-soft: #eaf1ff;
      --accent: #0f766e;
      --accent-soft: #e7f6f3;
      --warn: #a16207;
      --warn-soft: #fff7df;
      --danger: #b42318;
      --danger-soft: #fff0ee;
      --success: #16794c;
      --success-soft: #e7f7ee;
      --code-bg: #eef2f7;
      --shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
      --radius: 8px;
      --mono: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #101418;
        --surface: #161b22;
        --surface-soft: #1f2630;
        --text: #e7edf3;
        --muted: #9aa7b5;
        --border: #2c3642;
        --primary: #7aa2ff;
        --primary-soft: #17243f;
        --accent: #55c6b3;
        --accent-soft: #102b29;
        --warn: #f1c86b;
        --warn-soft: #35270c;
        --danger: #ff9a8f;
        --danger-soft: #351713;
        --success: #73d6a2;
        --success-soft: #123121;
        --code-bg: #202833;
        --shadow: none;
      }
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.65;
    }
    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; }
    code, pre { font-family: var(--mono); }
    code { background: var(--code-bg); border-radius: 4px; padding: 0.1em 0.35em; font-size: 0.92em; }
    pre { overflow: auto; background: var(--code-bg); border: 1px solid var(--border); border-radius: 6px; padding: 14px; }

    .doc {
      max-width: 1040px;
      margin: 0 auto;
      padding: 40px 28px 72px;
    }
    .doc-header {
      position: relative;
      border-bottom: 2px solid var(--border);
      padding: 0 0 24px;
      margin: 0 0 24px;
    }
    .doc-kicker {
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .doc-header h1 {
      margin: 6px 0 10px;
      max-width: 820px;
      font-size: 34px;
      line-height: 1.15;
      letter-spacing: 0;
    }
    .doc-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      color: var(--muted);
      font-size: 13px;
    }
    .doc-summary,
    .toc,
    .callout,
    .details-block,
    .diagram,
    .diff-block,
    .participants,
    .values-grid,
    .action-card {
      margin: 16px 0;
    }
    .doc-summary,
    .toc {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 16px 18px;
      box-shadow: var(--shadow);
    }
    .doc-summary ul,
    .toc ol { margin: 0; }
    .doc-section {
      margin: 42px 0 0;
      scroll-margin-top: 24px;
    }
    .doc-section h2 {
      margin: 0 0 14px;
      padding-left: 12px;
      border-left: 4px solid var(--primary);
      font-size: 23px;
      line-height: 1.25;
      letter-spacing: 0;
    }
    .doc-section h3 { margin: 24px 0 8px; font-size: 17px; }
    .section-empty { color: var(--muted); font-style: italic; }

    .callout {
      border-left: 4px solid var(--muted);
      border-radius: 0 6px 6px 0;
      padding: 12px 16px;
      background: var(--surface-soft);
    }
    .callout strong { display: block; margin-bottom: 2px; }
    .callout-info { border-color: var(--primary); background: var(--primary-soft); }
    .callout-warning { border-color: var(--warn); background: var(--warn-soft); }
    .callout-danger { border-color: var(--danger); background: var(--danger-soft); }
    .callout-success { border-color: var(--success); background: var(--success-soft); }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 14px 0 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }
    th { background: var(--surface-soft); font-weight: 700; }
    tr:last-child td { border-bottom: 0; }

    .participants,
    .values-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 12px;
    }
    .participant-card,
    .value-card,
    .action-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 14px 16px;
    }

    .details-block {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 0 14px;
    }
    .details-block summary {
      cursor: pointer;
      padding: 12px 0;
      font-weight: 700;
    }

    .diagram {
      position: relative;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 16px;
      overflow: auto;
    }
    .diagram figcaption {
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }
    .diagram svg { display: block; max-width: 100%; height: auto; margin: 0 auto; }
    .diagram-toolbar {
      position: absolute;
      top: 10px;
      right: 10px;
      display: flex;
      gap: 6px;
      opacity: 0;
      transition: opacity 0.15s ease;
    }
    .diagram:hover .diagram-toolbar,
    .diagram:focus-within .diagram-toolbar { opacity: 1; }
    .diagram-toolbar button,
    .lightbox button {
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font: inherit;
      font-size: 12px;
      padding: 4px 8px;
    }

    .diff-block {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .diff-side {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      overflow: hidden;
    }
    .diff-side h3 { margin: 0; padding: 10px 12px; background: var(--surface-soft); font-size: 14px; }
    .diff-side pre { margin: 0; border: 0; border-radius: 0; }
    .line-add { color: var(--success); }
    .line-remove { color: var(--danger); }
    .line-warning { color: var(--warn); }
    .line-context { color: var(--text); }

    .files,
    .source-refs,
    .open-questions,
    .acceptance-criteria { padding-left: 22px; }

    .doc-footer {
      margin-top: 56px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 32px;
      background: rgba(8, 13, 20, 0.82);
      z-index: 1000;
    }
    .lightbox.open { display: flex; }
    .lightbox-panel {
      position: relative;
      width: min(1120px, 96vw);
      height: min(760px, 88vh);
      border-radius: 10px;
      background: var(--surface);
      box-shadow: 0 20px 80px rgba(0, 0, 0, 0.35);
      overflow: hidden;
    }
    .lightbox-body {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      overflow: hidden;
      cursor: grab;
    }
    .lightbox-body svg { max-width: 92%; max-height: 82%; transform-origin: center; }
    .lightbox-toolbar {
      position: absolute;
      left: 14px;
      bottom: 14px;
      display: flex;
      gap: 8px;
    }
    .lightbox-close { position: absolute; top: 12px; right: 12px; z-index: 2; }

    @media (max-width: 760px) {
      .doc { padding: 24px 16px 48px; }
      .doc-header h1 { font-size: 27px; padding-right: 0; }
      .diff-block { grid-template-columns: 1fr; }
    }

    @media print {
      body { background: #fff; color: #111; }
      .doc { max-width: none; padding: 0; }
      .diagram-toolbar,
      .lightbox { display: none !important; }
      .doc-summary,
      .toc,
      .diagram,
      .callout,
      .action-card,
      table,
      pre { break-inside: avoid; box-shadow: none; }
    }
  </style>
</head>
<body>
  <article class="doc">
    <header class="doc-header">
      <div class="doc-kicker">{{ KICKER }}</div>
      <h1>{{ TITLE }}</h1>
      <div class="doc-meta">{{ META }}</div>
    </header>

    <section class="doc-summary" aria-label="Summary">
      {{ SUMMARY }}
    </section>

    <nav class="toc" aria-label="Table of contents">
      {{ TOC }}
    </nav>

    <main>
      {{ SECTIONS }}
    </main>

    <footer class="doc-footer">
      {{ FOOTER }}
    </footer>
  </article>

  <div class="lightbox" data-renderer-owned="true" data-interaction="diagram-viewer" role="dialog" aria-modal="true" aria-label="Diagram viewer">
    <div class="lightbox-panel">
      <button class="lightbox-close" type="button" data-renderer-owned="true" aria-label="Close">Close</button>
      <div class="lightbox-body"></div>
      <div class="lightbox-toolbar"></div>
    </div>
  </div>

  <script data-renderer-owned="true" data-interaction="diagram-viewer">
    (() => {
      const lightbox = document.querySelector('.lightbox[data-interaction="diagram-viewer"]');
      if (!lightbox) return;
      const body = lightbox.querySelector('.lightbox-body');
      const toolbar = lightbox.querySelector('.lightbox-toolbar');
      const close = lightbox.querySelector('.lightbox-close');
      let zoom = 1;
      let panX = 0;
      let panY = 0;
      let activeSvg = null;
      let activeClone = null;

      function fileBase(svg) {
        const figure = svg.closest('[data-download-name]');
        return (figure && figure.getAttribute('data-download-name')) || 'diagram';
      }
      function serialize(svg) {
        const clone = svg.cloneNode(true);
        if (!clone.getAttribute('xmlns')) clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
        return new XMLSerializer().serializeToString(clone);
      }
      function downloadBlob(blob, name) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = name;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 250);
      }
      function downloadSvg(svg) {
        downloadBlob(new Blob([serialize(svg)], { type: 'image/svg+xml;charset=utf-8' }), `${fileBase(svg)}.svg`);
      }
      function downloadPng(svg) {
        const blob = new Blob([serialize(svg)], { type: 'image/svg+xml;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const img = new Image();
        img.onload = () => {
          const box = svg.viewBox && svg.viewBox.baseVal;
          const width = box && box.width ? box.width : 900;
          const height = box && box.height ? box.height : 520;
          const canvas = document.createElement('canvas');
          canvas.width = width * 2;
          canvas.height = height * 2;
          const ctx = canvas.getContext('2d');
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.scale(2, 2);
          ctx.drawImage(img, 0, 0);
          URL.revokeObjectURL(url);
          canvas.toBlob((png) => png && downloadBlob(png, `${fileBase(svg)}.png`), 'image/png');
        };
        img.src = url;
      }
      function applyTransform() {
        if (activeClone) activeClone.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
      }
      function button(label, handler) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.textContent = label;
        btn.setAttribute('data-renderer-owned', 'true');
        btn.addEventListener('click', handler);
        return btn;
      }
      function open(svg) {
        activeSvg = svg;
        activeClone = svg.cloneNode(true);
        activeClone.removeAttribute('width');
        activeClone.removeAttribute('height');
        activeClone.style.transition = 'transform 0.08s ease-out';
        zoom = 1;
        panX = 0;
        panY = 0;
        body.replaceChildren(activeClone);
        toolbar.replaceChildren(
          button('Zoom -', () => { zoom = Math.max(0.25, zoom * 0.8); applyTransform(); }),
          button('Zoom +', () => { zoom = Math.min(8, zoom * 1.25); applyTransform(); }),
          button('Reset', () => { zoom = 1; panX = 0; panY = 0; applyTransform(); }),
          button('SVG', () => downloadSvg(activeSvg)),
          button('PNG', () => downloadPng(activeSvg))
        );
        lightbox.classList.add('open');
        applyTransform();
      }
      function closeLightbox() {
        lightbox.classList.remove('open');
        body.replaceChildren();
        toolbar.replaceChildren();
        activeSvg = null;
        activeClone = null;
      }

      close.addEventListener('click', closeLightbox);
      lightbox.addEventListener('click', (event) => {
        if (event.target === lightbox) closeLightbox();
      });
      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape' && lightbox.classList.contains('open')) closeLightbox();
      });
      body.addEventListener('wheel', (event) => {
        if (!activeClone) return;
        event.preventDefault();
        zoom = Math.max(0.25, Math.min(8, zoom * Math.exp(-event.deltaY * 0.0015)));
        applyTransform();
      }, { passive: false });

      let drag = null;
      body.addEventListener('mousedown', (event) => {
        if (!activeClone) return;
        drag = { x: event.clientX, y: event.clientY, panX, panY };
      });
      window.addEventListener('mousemove', (event) => {
        if (!drag) return;
        panX = drag.panX + event.clientX - drag.x;
        panY = drag.panY + event.clientY - drag.y;
        applyTransform();
      });
      window.addEventListener('mouseup', () => { drag = null; });

      document.querySelectorAll('.diagram').forEach((figure) => {
        if (figure.querySelector('.diagram-toolbar')) return;
        const svg = figure.querySelector('svg');
        if (!svg) return;
        const tools = document.createElement('div');
        tools.className = 'diagram-toolbar';
        tools.setAttribute('data-renderer-owned', 'true');
        tools.append(
          button('Open', () => open(svg)),
          button('SVG', () => downloadSvg(svg)),
          button('PNG', () => downloadPng(svg))
        );
        figure.appendChild(tools);
      });
    })();
  </script>
</body>
</html>
